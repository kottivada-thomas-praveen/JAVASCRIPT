<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h3>Rock paper Scissors</h3>
    <br />
    <button
      onclick="
        const randnum = Math.random();
        let computerMove;

        if (randnum > 0 && randnum <= 1 / 3) {
          computerMove = 'rock';
        } else if (randnum > 1 / 3 && randnum <= 2 / 3) {
          computerMove = 'paper';
        } else if (randnum > 2 / 3 && randnum <= 1) {
          computerMove = 'Scissors';
        }

        let result;

        if (computerMove === 'rock') {
          result = 'Tie.';
        } else if (computerMove === 'paper') {
          result = 'you lose.';
        } else {
          result = 'you win.';
        }

        alert(`your move = rock. computer move is ${computerMove}. ${result}`);
      "
    >
      Rock
    </button>
    <button
      onclick="
        const randnum_p = Math.random();
        let computerMove_p;
        let result_p;
        if (randnum_p > 0 && randnum_p <= 1 / 3) {
          computerMove_p = 'rock';
        } else if (randnum_p > 1 / 3 && randnum_p <= 2 / 3) {
          computerMove_p = 'paper';
        } else if (randnum_p > 2 / 3 && randnum_p <= 1) {
          computerMove_p = 'Scissors';
        }

        if (computerMove_p === 'rock') {
          result_p = 'You Win.';
        } else if (computerMove_p === 'paper') {
          result_p = 'tie.';
        } else {
          result_p = 'you Lose.';
        }

        alert(
          `your pick - paper. computer move is ${computerMove_p}. ${result_p}`,
        );
      "
    >
      Paper
    </button>

    <button
      onclick="
        const randnum_s = Math.random();
        let computerMove_s;
        let result_s;
        if (randnum_s > 0 && randnum_s <= 1 / 3) {
          computerMove_s = 'rock';
        } else if (randnum_s > 1 / 3 && randnum_s <= 2 / 3) {
          computerMove_s = 'paper';
        } else if (randnum_s > 2 / 3 && randnum_s <= 1) {
          computerMove_s = 'Scissors';
        }

        if (computerMove_s === 'rock') {
          result_s = 'You Win.';
        } else if (computerMove_s === 'paper') {
          result_s = 'tie.';
        } else {
          result_s = 'you Lose.';
        }

        alert(
          `your pick - paper. computer move is ${computerMove_s}. ${result_s}`,
        );
      "
    >
      Scissors
    </button>
    <script></script>
  </body>
</html>
